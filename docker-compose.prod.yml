services:
  # ═══════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════

  mongodb:
    image: mongo:7
    container_name: lobbi-mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: horizon_db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lobbi-net

  redis:
    image: redis:7-alpine
    container_name: lobbi-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lobbi-net

  # ═══════════════════════════════════════════════════════════════
  # BACKEND (FastAPI)
  # ═══════════════════════════════════════════════════════════════

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lobbi-backend
    restart: always
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: ${DB_NAME:-lobbi_db}
      JWT_SECRET: ${JWT_SECRET}
      CHAT_ENCRYPTION_KEY: ${CHAT_ENCRYPTION_KEY:-}
      CORS_ORIGINS: https://${DOMAIN:-lobbi.in},https://www.${DOMAIN:-lobbi.in}
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: production
      MQTT_BROKER: ${MQTT_BROKER:-broker.emqx.io}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lobbi-net

  # ═══════════════════════════════════════════════════════════════
  # FRONTEND (React)
  # ═══════════════════════════════════════════════════════════════

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: https://${DOMAIN:-lobbi.in}
    container_name: lobbi-frontend
    restart: always
    networks:
      - lobbi-net

  # ═══════════════════════════════════════════════════════════════
  # NGINX (Reverse Proxy + SSL)
  # ═══════════════════════════════════════════════════════════════

  nginx:
    image: nginx:alpine
    container_name: lobbi-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - lobbi-net

  # ═══════════════════════════════════════════════════════════════
  # CERTBOT (SSL Certificate Management)
  # ═══════════════════════════════════════════════════════════════

  certbot:
    image: certbot/certbot
    container_name: lobbi-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - lobbi-net

# ═══════════════════════════════════════════════════════════════
# VOLUMES
# ═══════════════════════════════════════════════════════════════

volumes:
  mongo_data:
  uploads_data:
  certbot_www:
  certbot_certs:

# ═══════════════════════════════════════════════════════════════
# NETWORKS
# ═══════════════════════════════════════════════════════════════

networks:
  lobbi-net:
    driver: bridge
