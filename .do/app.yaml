# ═══════════════════════════════════════════════════════════════
# LOBBI — Digital Ocean App Platform Specification
#
# Deploy via CLI:
#   doctl apps create --spec .do/app.yaml
#
# Or via DO Console:
#   Apps → Create App → Import from GitHub → detect app spec
# ═══════════════════════════════════════════════════════════════

name: lobbi
region: blr  # Bangalore (closest to India)

domains:
  - domain: lobbi.in
    type: PRIMARY
  - domain: www.lobbi.in
    type: ALIAS

# ═══════════════════════════════════════════════════════════════
# BACKEND — FastAPI Web Service
# ═══════════════════════════════════════════════════════════════
services:
  - name: backend
    dockerfile_path: backend/Dockerfile
    source_dir: /backend
    github:
      repo: mathavanr1968/HORIZON
      branch: main
      deploy_on_push: true
    http_port: 8000
    instance_count: 1
    instance_size_slug: professional-xs
    routes:
      - path: /api
        preserve_path_prefix: true
    health_check:
      http_path: /api/health
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: MONGO_URL
        scope: RUN_TIME
        value: ${db-mongodb.CONNECTION_STRING}
      - key: DB_NAME
        scope: RUN_TIME
        value: lobbi_db
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
        value: CHANGE_ME_AFTER_DEPLOY
      - key: CHAT_ENCRYPTION_KEY
        scope: RUN_TIME
        type: SECRET
        value: CHANGE_ME_AFTER_DEPLOY
      - key: CORS_ORIGINS
        scope: RUN_TIME
        value: https://lobbi.in,https://www.lobbi.in
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${db-redis.CONNECTION_STRING}
      - key: ENVIRONMENT
        scope: RUN_TIME
        value: production
      - key: MQTT_BROKER
        scope: RUN_TIME
        value: broker.emqx.io
      - key: MQTT_PORT
        scope: RUN_TIME
        value: "1883"

# ═══════════════════════════════════════════════════════════════
# FRONTEND — React Static Site (free on App Platform!)
# ═══════════════════════════════════════════════════════════════
static_sites:
  - name: frontend
    build_command: yarn install && yarn build
    source_dir: /frontend
    github:
      repo: mathavanr1968/HORIZON
      branch: main
      deploy_on_push: true
    output_dir: build
    routes:
      - path: /
    catchall_document: index.html
    envs:
      - key: REACT_APP_BACKEND_URL
        scope: BUILD_TIME
        value: https://lobbi.in

# ═══════════════════════════════════════════════════════════════
# MANAGED DATABASES (auto-provisioned by App Platform)
# ═══════════════════════════════════════════════════════════════
databases:
  - name: db-mongodb
    engine: MONGODB
    production: true
    cluster_name: lobbi-db
    db_name: lobbi_db
    db_user: lobbi_user
    version: "7"

  - name: db-redis
    engine: REDIS
    production: true
    cluster_name: lobbi-redis
    version: "7"
